<!DOCTYPE html>
<html>
<head>
<title>Seek 4 | Sign In</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:340px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.logo img{
height:40px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.switch{
margin-top:15px;
font-size:14px;
}

a{
color:#2563eb;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
<h3>Seek 4</h3>
</div>

<h2>Sign In</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p style="margin-top:10px">
<a href="index.html">← Back to Home</a>
</p>

<div class="switch">
Don't have an account? <a href="#">Sign Up</a>
</div>

</div>

</body>
</html>
