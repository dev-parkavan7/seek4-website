<!DOCTYPE html>
<html>
<head>
<title>Seek 4 Login</title>

<style>
body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>Sign In</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
