<!DOCTYPE html>
<html>
<head>
<title>Seek 4 | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

a{
color:#2563eb;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="mainBtn">Login</button>

<p id="toggleText">
Don't have an account?
<a id="signupLink">Sign Up</a>
</p>

</div>

<script>

let mainBtn = document.getElementById("mainBtn")
let title = document.getElementById("title")
let toggleText = document.getElementById("toggleText")
let signupLink = document.getElementById("signupLink")

mainBtn.onclick = login

signupLink.onclick = showSignup

function showSignup(){

title.innerText="Sign Up"

mainBtn.innerText="Create Account"
mainBtn.onclick = signup

toggleText.innerHTML =
'Already have an account? <a id="loginLink">Login</a>'

document.getElementById("loginLink").onclick = showLogin

}

function showLogin(){

title.innerText="Login"

mainBtn.innerText="Login"
mainBtn.onclick = login

toggleText.innerHTML =
"Don't have an account? <a id='signupLink'>Sign Up</a>"

document.getElementById("signupLink").onclick = showSignup

}

function signup(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

if(email==="" || password===""){
alert("Please enter email and password")
return
}

localStorage.setItem("userEmail", email)
localStorage.setItem("userPassword", password)

alert("Account created successfully")

showLogin()

}

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let savedEmail=localStorage.getItem("userEmail")
let savedPassword=localStorage.getItem("userPassword")

if(email===savedEmail && password===savedPassword){

localStorage.setItem("loggedUser", email)

alert("Login successful")

window.location.href="index.html"

}else{

alert("Invalid email or password")

}

}

</script>

</body>
</html>
